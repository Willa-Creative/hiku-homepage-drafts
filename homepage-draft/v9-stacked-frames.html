<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiku — V9 Stacked Frames</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --brown: #3D1C1E;
      --almond: #FDF8F5;
      --serif: 'Playfair Display', 'Big Caslon', Georgia, serif;
      --sans: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --thumb-size: 120px;
      --thumb-gap: 24px;
    }
    html, body { min-height: 100%; }
    body {
      font-family: var(--sans);
      background: var(--almond);
      color: var(--brown);
      -webkit-font-smoothing: antialiased;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ─── Thumbnails ─── */
    .thumbnails-wrap { overflow: hidden; padding: 32px 0 24px; }
    .thumbnails { position: relative; height: var(--thumb-size); margin: 0 auto; }
    .thumb {
      width: var(--thumb-size); height: var(--thumb-size);
      border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      position: absolute; top: 0; left: 50%;
      margin-left: calc(var(--thumb-size) / -2);
      transition: border-color 0.3s ease, transform 0.3s ease, opacity 0.3s ease;
      border: 1px solid transparent; background: transparent;
    }
    .thumb.active { border-color: var(--brown); }
    .thumb img { width: 85%; height: 85%; object-fit: contain; pointer-events: none; }

    /* ─── Stack Container ─── */
    .stack-container {
      position: relative;
      margin: 24px 48px 0;
      height: 70vh;
      margin-bottom: 240px;
    }

    .product-stack { position: absolute; inset: 0; display: none; }
    .product-stack.active { display: block; }

    /* ─── Frames ─── */
    .frame {
      position: absolute; inset: 0; overflow: hidden;
      border-radius: 12px; cursor: pointer;
      will-change: transform;
      transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .frame[data-depth="0"] { z-index: 10; transform: translateY(0) scale(1); }
    .frame[data-depth="1"] { z-index: 9; transform: translateY(90px) scale(0.96); }
    .frame[data-depth="2"] { z-index: 8; transform: translateY(180px) scale(0.92); }

    /* Image-based frame */
    .frame__bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
    }

    /* Generic placeholder frame */
    .frame--placeholder {
      display: flex; align-items: center; justify-content: center;
    }
    .frame--placeholder span {
      font-family: var(--serif);
      font-size: 18px;
      opacity: 0.4;
      text-align: center;
      line-height: 1.5;
    }

    @media (max-width: 768px) {
      :root { --thumb-size: 72px; --thumb-gap: 12px; }
      .stack-container { margin: 16px 16px 24px; }
    }
  </style>
</head>
<body>

  <div class="thumbnails-wrap">
    <div class="thumbnails" id="thumbnails"></div>
  </div>

  <div class="stack-container" id="stackContainer"></div>

  <script>
    const IMG_JAR = 'assets/b1983030efe5da27c6000b46e47a3bb5cb301ba1.png';
    const IMG_DROPPER = 'assets/2073f3c36a70227dc6ab5531ba597f67945f8777.png';
    const IMG_TUBE = 'assets/b0eb6302ee336ef8745a70594462453669872c14.png';
    const IMG_SLIM = 'assets/bf4ac0864ff9934a18e93943c82515606d8017bd.png';

    const products = [
      {
        name: 'Matcha Skin Cleanser', img: IMG_TUBE,
        frames: [
          { type: 'image', src: 'assets/matcha-hero.png' },
          { type: 'image', src: 'assets/matcha-pdp.png' },
          { type: 'image', src: 'assets/matcha-ugc.png' },
        ]
      },
      {
        name: 'Guava Glow Moisturizer', img: IMG_JAR,
        color: '#e4bfae',
        frames: [
          { type: 'placeholder', color: '#e4bfae', label: 'Hero' },
          { type: 'placeholder', color: '#d4a08a', label: 'PDP' },
          { type: 'placeholder', color: '#c08870', label: 'UGC' },
        ]
      },
      {
        name: 'Soft Matte Moisturizer', img: IMG_JAR,
        frames: [
          { type: 'placeholder', color: '#e8ccc0', label: 'Hero' },
          { type: 'placeholder', color: '#d8b0a0', label: 'PDP' },
          { type: 'placeholder', color: '#c49888', label: 'UGC' },
        ]
      },
      {
        name: 'Oak Milk Toner', img: IMG_DROPPER,
        frames: [
          { type: 'placeholder', color: '#dcc4b4', label: 'Hero' },
          { type: 'placeholder', color: '#ccac98', label: 'PDP' },
          { type: 'placeholder', color: '#b89480', label: 'UGC' },
        ]
      },
      {
        name: 'Green Juice Serum', img: IMG_DROPPER,
        frames: [
          { type: 'placeholder', color: '#c8d4b8', label: 'Hero' },
          { type: 'placeholder', color: '#b0c098', label: 'PDP' },
          { type: 'placeholder', color: '#98ac80', label: 'UGC' },
        ]
      },
      {
        name: 'Smooth Skin Face Scrub', img: IMG_TUBE,
        frames: [
          { type: 'placeholder', color: '#dcc0b0', label: 'Hero' },
          { type: 'placeholder', color: '#cca898', label: 'PDP' },
          { type: 'placeholder', color: '#b89080', label: 'UGC' },
        ]
      },
      {
        name: 'Glac\u00e9 Kiss Balm', img: IMG_SLIM,
        frames: [
          { type: 'placeholder', color: '#e4c8bc', label: 'Hero' },
          { type: 'placeholder', color: '#d4b0a0', label: 'PDP' },
          { type: 'placeholder', color: '#c09884', label: 'UGC' },
        ]
      },
    ];

    const N = products.length;
    let activeIndex = 0;
    const stackContainer = document.getElementById('stackContainer');
    const thumbsContainer = document.getElementById('thumbnails');
    const activeSlide = new Array(N).fill(0);

    // Build thumbnails
    const thumbEls = [];
    products.forEach((p, i) => {
      const div = document.createElement('div');
      div.className = 'thumb';
      div.innerHTML = `<img src="${p.img}" alt="${p.name}">`;
      div.addEventListener('click', () => selectProduct(i));
      thumbsContainer.appendChild(div);
      thumbEls.push(div);
    });

    // Build frames per product
    products.forEach((p, pi) => {
      const stackDiv = document.createElement('div');
      stackDiv.className = 'product-stack';
      stackDiv.dataset.product = pi;

      p.frames.forEach((f, fi) => {
        const frame = document.createElement('div');
        frame.dataset.slide = fi;

        if (f.type === 'image') {
          frame.className = 'frame';
          frame.innerHTML = `<div class="frame__bg" style="background-image:url('${f.src}')"></div>`;
        } else {
          frame.className = 'frame frame--placeholder';
          frame.style.background = f.color;
          frame.innerHTML = `<span>${p.name}<br>${f.label}</span>`;
        }

        frame.addEventListener('click', () => cycleSlide(pi));
        stackDiv.appendChild(frame);
      });

      stackContainer.appendChild(stackDiv);
    });

    // ─── Slide cycling ───
    function cycleSlide(pi) {
      activeSlide[pi] = (activeSlide[pi] + 1) % 3;
      layoutStack(pi);
    }

    function layoutStack(pi) {
      const el = stackContainer.querySelector(`.product-stack[data-product="${pi}"]`);
      const frames = el.querySelectorAll('.frame');
      const cur = activeSlide[pi];
      frames.forEach((f, fi) => {
        f.dataset.depth = (fi - cur + 3) % 3;
      });
    }

    // ─── Thumbnail positioning ───
    let transitioning = false;
    const STEP = 144;

    function getOffset(i, active) {
      let o = i - active;
      if (o > Math.floor(N / 2)) o -= N;
      if (o < -Math.floor(N / 2)) o += N;
      return o;
    }

    function selectProduct(index, force) {
      if ((index === activeIndex && !force) || transitioning) return;
      const prev = activeIndex;
      activeIndex = index;

      if (force) {
        thumbEls.forEach((el, i) => {
          const o = getOffset(i, activeIndex);
          el.style.transition = 'none';
          el.style.transform = `translateX(${o * STEP}px)`;
          el.style.opacity = '1';
          el.offsetHeight;
          el.style.transition = '';
          el.classList.toggle('active', i === activeIndex);
        });
      } else {
        transitioning = true;
        thumbEls.forEach((el, i) => {
          const oldO = getOffset(i, prev);
          const newO = getOffset(i, activeIndex);
          if (Math.abs(newO - oldO) > 2) {
            el.style.transform = `translateX(${oldO * STEP}px) scale(0.3)`;
            el.style.opacity = '0';
            setTimeout(() => {
              el.style.transition = 'none';
              el.style.transform = `translateX(${newO * STEP}px) scale(0.3)`;
              el.offsetHeight;
              el.style.transition = '';
              el.style.transform = `translateX(${newO * STEP}px) scale(1)`;
              el.style.opacity = '1';
            }, 280);
          } else {
            el.style.transform = `translateX(${newO * STEP}px)`;
            el.style.opacity = '1';
          }
          el.classList.toggle('active', i === activeIndex);
        });
        setTimeout(() => { transitioning = false; }, 560);
      }

      document.querySelectorAll('.product-stack').forEach((s, si) => {
        s.classList.toggle('active', si === index);
      });
      activeSlide[index] = 0;
      layoutStack(index);
    }

    // Init
    selectProduct(activeIndex, true);

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); selectProduct((activeIndex + 1) % N); }
      else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); selectProduct((activeIndex - 1 + N) % N); }
    });

    // Swipe
    let touchStartX = 0;
    stackContainer.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
    stackContainer.addEventListener('touchend', (e) => {
      const d = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(d) > 50) { d < 0 ? selectProduct((activeIndex + 1) % N) : selectProduct((activeIndex - 1 + N) % N); }
    }, { passive: true });
  </script>
</body>
</html>
