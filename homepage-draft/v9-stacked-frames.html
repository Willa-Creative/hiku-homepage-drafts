<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiku — V9 Stacked Frames</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --brown: #3D1C1E;
      --almond: #FDF8F5;
      --serif: 'Playfair Display', 'Big Caslon', Georgia, serif;
      --sans: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --thumb-size: 120px;
      --thumb-gap: 24px;
    }
    html, body { min-height: 100%; }
    body {
      font-family: var(--sans);
      background: var(--almond);
      color: var(--brown);
      -webkit-font-smoothing: antialiased;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ─── Thumbnails ─── */
    .thumbnails-wrap {
      position: sticky; top: 0; z-index: 200;
      background: var(--almond);
      overflow: hidden; padding: 24px 0 16px;
    }
    .thumbnails { position: relative; height: var(--thumb-size); margin: 0 auto; }
    .thumb {
      width: var(--thumb-size); height: var(--thumb-size);
      border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      position: absolute; top: 0; left: 50%;
      margin-left: calc(var(--thumb-size) / -2);
      transition: border-color 0.3s ease, transform 0.3s ease, opacity 0.3s ease;
      border: 1px solid transparent; background: transparent;
    }
    .thumb.active { border-color: var(--brown); }
    .thumb img { width: 85%; height: 85%; object-fit: contain; pointer-events: none; }
    .thumb--logo { border: none !important; }
    .thumb--logo svg { width: 60%; height: 60%; }

    /* ─── Scroll Track ─── */
    .scroll-track { position: relative; }

    /* ─── Sticky viewport ─── */
    .stack-sticky {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
    }

    .stack-container {
      position: absolute;
      left: 0; right: 0;
      /* starts below the sticky thumb bar (~160px) with side margins */
      top: 160px;
      bottom: 0;
      margin: 0 48px;
    }

    .product-stack {
      position: absolute; inset: 0;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .product-stack.active { opacity: 1; pointer-events: auto; }

    /* ─── Frames ─── */
    .frame {
      position: absolute;
      left: 0; right: 0; top: 0;
      height: 100%;
      overflow: hidden;
      border-radius: 12px;
      will-change: transform, opacity;
    }
    .frame__bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
    }
    .frame--placeholder {
      display: flex; align-items: center; justify-content: center;
    }
    .frame--placeholder span {
      font-family: var(--serif); font-size: 18px;
      opacity: 0.4; text-align: center; line-height: 1.5;
    }
    .frame--single {
      position: relative; border-radius: 12px; overflow: hidden;
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }

    @media (max-width: 768px) {
      :root { --thumb-size: 72px; --thumb-gap: 12px; }
      .stack-container { margin: 0 16px; top: 112px; }
    }
  </style>
</head>
<body>

  <div class="thumbnails-wrap" id="thumbBar">
    <div class="thumbnails" id="thumbnails"></div>
  </div>

  <div class="scroll-track" id="scrollTrack">
    <div class="stack-sticky">
      <div class="stack-container" id="stackContainer"></div>
    </div>
  </div>

  <div style="height: 100px;"></div>

  <script>
    const IMG_JAR = 'assets/b1983030efe5da27c6000b46e47a3bb5cb301ba1.png';
    const IMG_DROPPER = 'assets/2073f3c36a70227dc6ab5531ba597f67945f8777.png';
    const IMG_TUBE = 'assets/b0eb6302ee336ef8745a70594462453669872c14.png';
    const IMG_SLIM = 'assets/bf4ac0864ff9934a18e93943c82515606d8017bd.png';

    const LOGO_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="48" height="62" viewBox="0 0 48 62" fill="none"><path d="M43.3792 52.6969V35.6863C43.3792 19.0511 29.9325 19.8104 16.713 29.4093V0L0 4.17174C5.05805 4.9828 6.64833 8.26583 6.64833 16.1175V52.7012C6.64833 57.8091 2.80764 60.9152 2.03179 61.6961H21.3338C20.5537 60.9109 16.7173 57.8091 16.7173 52.7012V30.1729C27.1591 23.5205 33.4688 27.071 33.4688 38.4128V52.7012C33.4688 57.8091 29.6281 60.9152 28.848 61.6961H48C47.2241 60.9109 43.3835 57.8091 43.3835 52.7012" fill="#3D1C1E"/></svg>`;

    const products = [
      {
        name: 'hiku', type: 'logo',
        frames: [{ type: 'image', src: 'assets/main-hero.png' }]
      },
      {
        name: 'Matcha Skin Cleanser', img: IMG_TUBE,
        frames: [
          { type: 'image', src: 'assets/matcha-hero-new.png' },
          { type: 'image', src: 'assets/matcha-calmplex.png' },
          { type: 'image', src: 'assets/matcha-ugc-new.png' },
        ]
      },
      {
        name: 'Guava Glow Moisturizer', img: IMG_JAR,
        frames: [
          { type: 'placeholder', color: '#e4bfae', label: 'Hero' },
          { type: 'placeholder', color: '#d4a08a', label: 'PDP' },
          { type: 'placeholder', color: '#c08870', label: 'UGC' },
        ]
      },
      {
        name: 'Soft Matte Moisturizer', img: IMG_JAR,
        frames: [
          { type: 'placeholder', color: '#e8ccc0', label: 'Hero' },
          { type: 'placeholder', color: '#d8b0a0', label: 'PDP' },
          { type: 'placeholder', color: '#c49888', label: 'UGC' },
        ]
      },
      {
        name: 'Oak Milk Toner', img: IMG_DROPPER,
        frames: [
          { type: 'placeholder', color: '#dcc4b4', label: 'Hero' },
          { type: 'placeholder', color: '#ccac98', label: 'PDP' },
          { type: 'placeholder', color: '#b89480', label: 'UGC' },
        ]
      },
      {
        name: 'Green Juice Serum', img: IMG_DROPPER,
        frames: [
          { type: 'placeholder', color: '#c8d4b8', label: 'Hero' },
          { type: 'placeholder', color: '#b0c098', label: 'PDP' },
          { type: 'placeholder', color: '#98ac80', label: 'UGC' },
        ]
      },
      {
        name: 'Smooth Skin Face Scrub', img: IMG_TUBE,
        frames: [
          { type: 'placeholder', color: '#dcc0b0', label: 'Hero' },
          { type: 'placeholder', color: '#cca898', label: 'PDP' },
          { type: 'placeholder', color: '#b89080', label: 'UGC' },
        ]
      },
      {
        name: 'Glacé Kiss Balm', img: IMG_SLIM,
        frames: [
          { type: 'placeholder', color: '#e4c8bc', label: 'Hero' },
          { type: 'placeholder', color: '#d4b0a0', label: 'PDP' },
          { type: 'placeholder', color: '#c09884', label: 'UGC' },
        ]
      },
    ];

    // ─── Config ───
    const UNSTACK_SCROLL = 300;   // px to go from stacked → full width
    const FRAME_SCROLL = 600;     // px per frame while scroll-locked
    const STACK_OFFSET = 90;
    const STACK_SCALE_STEP = 0.04;
    const INITIAL_MARGIN = 48;    // initial side margin (matches CSS)

    const N = products.length;
    let activeIndex = 0;
    const scrollTrack = document.getElementById('scrollTrack');
    const stackContainer = document.getElementById('stackContainer');
    const thumbsContainer = document.getElementById('thumbnails');

    // ─── Build thumbnails ───
    const thumbEls = [];
    products.forEach((p, i) => {
      const div = document.createElement('div');
      if (p.type === 'logo') {
        div.className = 'thumb thumb--logo';
        div.innerHTML = LOGO_SVG;
      } else {
        div.className = 'thumb';
        div.innerHTML = `<img src="${p.img}" alt="${p.name}">`;
      }
      div.addEventListener('click', () => selectProduct(i));
      thumbsContainer.appendChild(div);
      thumbEls.push(div);
    });

    // ─── Build frames ───
    const stackEls = [];
    products.forEach((p, pi) => {
      const stackDiv = document.createElement('div');
      stackDiv.className = 'product-stack';
      stackDiv.dataset.product = pi;

      const isSingle = p.frames.length === 1;

      p.frames.forEach((f, fi) => {
        const frame = document.createElement('div');
        frame.dataset.slide = fi;

        if (f.type === 'image') {
          frame.className = isSingle ? 'frame frame--single' : 'frame';
          frame.innerHTML = `<div class="frame__bg" style="background-image:url('${f.src}')"></div>`;
        } else {
          frame.className = isSingle ? 'frame frame--single frame--placeholder' : 'frame frame--placeholder';
          frame.style.background = f.color;
          frame.innerHTML = `<span>${p.name}<br>${f.label}</span>`;
        }

        stackDiv.appendChild(frame);
      });

      stackContainer.appendChild(stackDiv);
      stackEls.push(stackDiv);
    });

    // ─── Scroll track height ───
    function updateScrollTrackHeight() {
      const frameCount = products[activeIndex].frames.length;
      if (frameCount <= 1) {
        scrollTrack.style.height = '100vh';
      } else {
        scrollTrack.style.height = (UNSTACK_SCROLL + frameCount * FRAME_SCROLL + 100) + 'px';
      }
    }

    // ─── Scroll-driven animation ───
    function updateFrames() {
      const p = products[activeIndex];
      const frameCount = p.frames.length;
      if (frameCount <= 1) return;

      const trackRect = scrollTrack.getBoundingClientRect();
      const scrolled = -trackRect.top;

      const stackEl = stackEls[activeIndex];
      const frames = stackEl.querySelectorAll('.frame');

      if (scrolled < 0) {
        // Before track — stacked with margins
        stackContainer.style.left = '';
        stackContainer.style.right = '';
        stackContainer.style.margin = '0 ' + INITIAL_MARGIN + 'px';
        frames.forEach((f, fi) => {
          f.style.transform = `translateY(${fi * STACK_OFFSET}px) scale(${1 - fi * STACK_SCALE_STEP})`;
          f.style.zIndex = frameCount - fi;
          f.style.opacity = '1';
          f.style.borderRadius = '12px';
        });
        return;
      }

      if (scrolled <= UNSTACK_SCROLL) {
        // Phase 1: Unstack + expand to full width
        const t = Math.min(1, scrolled / UNSTACK_SCROLL);
        const ease = t * (2 - t); // ease-out

        // Margins shrink from INITIAL_MARGIN to 0
        const margin = INITIAL_MARGIN * (1 - ease);
        stackContainer.style.margin = '0 ' + margin + 'px';

        // Top shrinks to 0 (frames fill viewport below thumb bar)
        const initTop = 160;
        const topVal = initTop * (1 - ease);
        stackContainer.style.top = topVal + 'px';

        frames.forEach((f, fi) => {
          const offsetY = (fi * STACK_OFFSET) * (1 - ease);
          const scale = 1 - (fi * STACK_SCALE_STEP) * (1 - ease);
          const radius = 12 * (1 - ease);
          f.style.transform = `translateY(${offsetY}px) scale(${scale})`;
          f.style.zIndex = frameCount - fi;
          f.style.opacity = '1';
          f.style.borderRadius = radius + 'px';
        });
      } else {
        // Phase 2: Fully expanded, scroll-locked, cycle frames
        stackContainer.style.margin = '0';
        stackContainer.style.top = '0';

        const cycleScrolled = scrolled - UNSTACK_SCROLL;
        const currentFrame = Math.min(frameCount - 1, Math.floor(cycleScrolled / FRAME_SCROLL));
        const frameProgress = (cycleScrolled - currentFrame * FRAME_SCROLL) / FRAME_SCROLL;

        frames.forEach((f, fi) => {
          f.style.transform = 'translateY(0) scale(1)';
          f.style.borderRadius = '0px';

          if (fi === currentFrame) {
            f.style.opacity = '1';
            f.style.zIndex = 10;
          } else if (fi === currentFrame + 1 && currentFrame < frameCount - 1) {
            // Next frame fades in during last 40% of scroll
            const fadeIn = Math.max(0, (frameProgress - 0.6) / 0.4);
            f.style.opacity = fadeIn;
            f.style.zIndex = 11;
          } else {
            f.style.opacity = '0';
            f.style.zIndex = 1;
          }
        });
      }
    }

    // ─── Reset stack styles when switching products ───
    function resetStackStyles() {
      stackContainer.style.margin = '0 ' + INITIAL_MARGIN + 'px';
      stackContainer.style.top = '160px';
    }

    // ─── Thumbnail positioning ───
    let transitioning = false;
    const STEP = 144;

    function getOffset(i, active) {
      let o = i - active;
      if (o > Math.floor(N / 2)) o -= N;
      if (o < -Math.floor(N / 2)) o += N;
      return o;
    }

    function selectProduct(index, force) {
      if ((index === activeIndex && !force) || transitioning) return;
      const prev = activeIndex;
      activeIndex = index;

      if (force) {
        thumbEls.forEach((el, i) => {
          const o = getOffset(i, activeIndex);
          el.style.transition = 'none';
          el.style.transform = `translateX(${o * STEP}px)`;
          el.style.opacity = '1';
          el.offsetHeight;
          el.style.transition = '';
          el.classList.toggle('active', i === activeIndex);
        });
      } else {
        transitioning = true;
        thumbEls.forEach((el, i) => {
          const oldO = getOffset(i, prev);
          const newO = getOffset(i, activeIndex);
          if (Math.abs(newO - oldO) > 2) {
            el.style.transform = `translateX(${oldO * STEP}px) scale(0.3)`;
            el.style.opacity = '0';
            setTimeout(() => {
              el.style.transition = 'none';
              el.style.transform = `translateX(${newO * STEP}px) scale(0.3)`;
              el.offsetHeight;
              el.style.transition = '';
              el.style.transform = `translateX(${newO * STEP}px) scale(1)`;
              el.style.opacity = '1';
            }, 280);
          } else {
            el.style.transform = `translateX(${newO * STEP}px)`;
            el.style.opacity = '1';
          }
          el.classList.toggle('active', i === activeIndex);
        });
        setTimeout(() => { transitioning = false; }, 560);
      }

      stackEls.forEach((s, si) => s.classList.toggle('active', si === index));
      resetStackStyles();
      updateScrollTrackHeight();

      if (!force) {
        scrollTrack.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

      updateFrames();
    }

    // ─── Scroll listener ───
    window.addEventListener('scroll', updateFrames, { passive: true });

    // ─── Init ───
    selectProduct(activeIndex, true);

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') { e.preventDefault(); selectProduct((activeIndex + 1) % N); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); selectProduct((activeIndex - 1 + N) % N); }
    });

    // Swipe
    let touchStartX = 0;
    stackContainer.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
    stackContainer.addEventListener('touchend', (e) => {
      const d = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(d) > 50) { d < 0 ? selectProduct((activeIndex + 1) % N) : selectProduct((activeIndex - 1 + N) % N); }
    }, { passive: true });
  </script>
</body>
</html>
