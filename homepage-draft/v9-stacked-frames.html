<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiku — V9 Stacked Frames</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --brown: #3D1C1E;
      --almond: #FDF8F5;
      --pink: #F5E6E0;
      --rosewood: #C4A0A7;
      --stone: #A6A09B;
      --serif: 'Playfair Display', 'Big Caslon', Georgia, serif;
      --sans: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --thumb-size: 120px;
      --thumb-size-small: 64px;
      --thumb-gap: 24px;
      --thumb-gap-small: 16px;
      --nav-height: 184px;
      --nav-height-small: 96px;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--sans);
      background: var(--almond);
      color: var(--brown);
      -webkit-font-smoothing: antialiased;
      -webkit-user-select: none;
      user-select: none;
      min-height: 100vh;
    }

    /* ─── Sticky Nav ─── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--almond);
      overflow: hidden;
      transition: height 0.5s cubic-bezier(0.16, 1, 0.3, 1),
                  box-shadow 0.3s ease;
      height: var(--nav-height);
    }
    .nav.compact {
      height: var(--nav-height-small);
      box-shadow: 0 1px 0 rgba(61,28,30,0.06);
    }

    .thumbnails {
      position: relative;
      height: 100%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .thumb {
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      transition: border-color 0.3s ease,
                  transform 0.3s ease,
                  opacity 0.3s ease,
                  width 0.5s cubic-bezier(0.16, 1, 0.3, 1),
                  height 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      border: 1px solid transparent;
      background: transparent;
    }
    .thumb.active {
      border-color: var(--brown);
    }
    .thumb img, .thumb svg {
      width: 85%;
      height: 85%;
      object-fit: contain;
      pointer-events: none;
    }
    .thumb--logo {
      border: none !important;
    }
    .thumb--logo svg {
      width: 70%;
      height: auto;
    }

    /* ─── Stack Container ─── */
    .stack-container {
      position: relative;
      width: 100%;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 48px;
    }

    .product-stack {
      display: none;
      position: relative;
    }
    .product-stack.active {
      display: block;
    }

    .frame {
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 16px;
      position: absolute;
      top: 0;
      left: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1),
                  opacity 0.5s ease;
    }
    .frame:first-child {
      position: relative;
    }

    .frame__bg {
      position: absolute;
      inset: 0;
    }
    .frame__content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 40px;
      text-align: center;
    }
    .frame__content img {
      max-height: 60%;
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 8px 32px rgba(61,28,30,0.15));
    }
    .frame__title {
      font-family: var(--serif);
      font-size: clamp(24px, 3.5vw, 36px);
      margin-bottom: 8px;
    }
    .frame__subtitle {
      font-size: 14px;
      color: var(--stone);
      line-height: 1.6;
      max-width: 400px;
    }
    .frame__price {
      font-family: var(--serif);
      font-size: 20px;
      color: var(--rosewood);
      margin-top: 8px;
    }

    /* Brand frame styles */
    .frame--brand .frame__content {
      gap: 12px;
    }
    .frame--brand-logo {
      font-family: var(--serif);
      font-size: clamp(48px, 8vw, 80px);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .frame--brand-logo sup {
      font-size: 0.18em;
      font-style: italic;
      font-weight: 400;
      opacity: 0.5;
      vertical-align: super;
    }
    .frame--brand-tagline {
      font-family: var(--serif);
      font-style: italic;
      font-size: clamp(16px, 2vw, 22px);
      color: var(--rosewood);
    }
    .frame--brand-cta {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--stone);
      margin-top: 8px;
    }

    /* Slide navigation dots */
    .slide-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
      position: relative;
      z-index: 10;
    }
    .slide-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--rosewood);
      opacity: 0.3;
      cursor: pointer;
      transition: opacity 0.3s ease;
    }
    .slide-dot.active {
      opacity: 1;
    }

    /* Spacer so we can scroll */
    .spacer {
      height: 240px;
    }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      :root {
        --thumb-size: 72px;
        --thumb-size-small: 44px;
        --thumb-gap: 12px;
        --thumb-gap-small: 10px;
        --nav-height: 120px;
        --nav-height-small: 72px;
      }
      .stack-container { padding: 0 20px; margin-top: 24px; }
      .frame { border-radius: 12px; }
      .frame__content { padding: 24px; }
    }
  </style>
</head>
<body>

  <!-- Sticky product nav -->
  <nav class="nav" id="nav">
    <div class="thumbnails" id="thumbnails"></div>
  </nav>

  <!-- Stacked frames -->
  <div class="stack-container" id="stackContainer"></div>

  <div class="spacer"></div>

  <script>
    const IMG_JAR = 'assets/b1983030efe5da27c6000b46e47a3bb5cb301ba1.png';
    const IMG_DROPPER = 'assets/2073f3c36a70227dc6ab5531ba597f67945f8777.png';
    const IMG_TUBE = 'assets/b0eb6302ee336ef8745a70594462453669872c14.png';
    const IMG_SLIM = 'assets/bf4ac0864ff9934a18e93943c82515606d8017bd.png';

    const items = [
      { type: 'logo', name: 'hiku',
        slides: [
          { type: 'brand-hero', bg: 'radial-gradient(ellipse at 50% 40%, #F5E6E0 0%, #FDF8F5 70%)' },
          { type: 'brand-values', bg: 'radial-gradient(ellipse at 50% 50%, #f0ddd6 0%, #FDF8F5 70%)' },
          { type: 'brand-discover', bg: 'radial-gradient(ellipse at 50% 60%, #e8d0c8 0%, #FDF8F5 70%)' },
        ]
      },
      { type: 'product', name: 'Guava Glow Moisturizer', price: '$32', img: IMG_JAR,
        bg: 'radial-gradient(ellipse at 40% 40%, #e4bfae 0%, #d4a08a 30%, #c08870 60%, #a87060 100%)',
        desc: 'A dewy, whipped moisturizer infused with guava extract for a lit-from-within glow.',
        howto: 'Apply a small amount to clean skin morning and evening. Pat gently — let it absorb before layering.',
        ingredients: 'Guava Extract · Hyaluronic Acid · Squalane' },
      { type: 'product', name: 'Soft Matte Moisturizer', price: '$32', img: IMG_JAR,
        bg: 'radial-gradient(ellipse at 55% 35%, #e8ccc0 0%, #d8b0a0 30%, #c49888 60%, #b08070 100%)',
        desc: 'Velvet-finish moisturizer that controls shine without drying. Perfect canvas for makeup.',
        howto: 'Smooth over face and neck after serum. Use as the last step before sunscreen.',
        ingredients: 'Niacinamide · Rice Bran · Ceramides' },
      { type: 'product', name: 'Oak Milk Toner', price: '$28', img: IMG_DROPPER,
        bg: 'radial-gradient(ellipse at 45% 50%, #dcc4b4 0%, #ccac98 30%, #b89480 60%, #a47c68 100%)',
        desc: 'Milky, pH-balancing toner with oat extract to soothe and prep.',
        howto: 'Dispense a few drops onto palms or cotton pad. Press gently into freshly cleansed skin.',
        ingredients: 'Oat Extract · Panthenol · Allantoin' },
      { type: 'product', name: 'Matcha Skin Cleanser', price: '$26', img: IMG_TUBE,
        bg: 'radial-gradient(ellipse at 50% 40%, #d8c4b0 0%, #c8aa94 30%, #b49078 60%, #a07860 100%)',
        desc: 'Creamy gel cleanser powered by matcha antioxidants. Removes everything without stripping.',
        howto: 'Massage onto damp skin in circles. Rinse with lukewarm water. Use morning and night.',
        ingredients: 'Matcha · Green Tea · Aloe Vera' },
      { type: 'product', name: 'Green Juice Serum', price: '$38', img: IMG_DROPPER,
        bg: 'radial-gradient(ellipse at 60% 45%, #e0c8b8 0%, #d0b09c 30%, #bc9880 60%, #a88068 100%)',
        desc: 'Concentrated green superfood serum. Kale, spinach, and chlorophyll for your skin.',
        howto: 'Apply 3-4 drops after toner. Press into skin — let it fully absorb before moisturizer.',
        ingredients: 'Kale Extract · Chlorophyll · Centella' },
      { type: 'product', name: 'Smooth Skin Face Scrub', price: '$24', img: IMG_TUBE,
        bg: 'radial-gradient(ellipse at 35% 55%, #dcc0b0 0%, #cca898 30%, #b89080 60%, #a47868 100%)',
        desc: 'Fine rice powder exfoliant that buffs without micro-tears. Resurfaced smoothness.',
        howto: 'Use 2-3x a week on damp skin. Gentle circular motions for 60 seconds, then rinse.',
        ingredients: 'Rice Powder · Jojoba Beads · Vitamin E' },
      { type: 'product', name: 'Glacé Kiss Balm', price: '$22', img: IMG_SLIM,
        bg: 'radial-gradient(ellipse at 50% 50%, #e4c8bc 0%, #d4b0a0 30%, #c09884 60%, #ac806c 100%)',
        desc: 'Glossy, hydrating lip balm with a barely-there tint. Soft lips all day.',
        howto: 'Swipe on lips whenever they need love. Layer for more color or wear sheer.',
        ingredients: 'Shea Butter · Vitamin E · Jojoba Oil' },
    ];

    const FRAME_OFFSET = 90;
    const FRAME_SCALE_STEP = 0.04;
    const N = items.length;
    let activeIndex = 0;
    let activeSlide = {}; // per-item active slide index

    const nav = document.getElementById('nav');
    const thumbsContainer = document.getElementById('thumbnails');
    const stackContainer = document.getElementById('stackContainer');
    let isCompact = false;

    // Hiku logo SVG
    const logoSVG = `<svg viewBox="0 0 120 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <text x="60" y="38" text-anchor="middle" font-family="'Playfair Display',serif" font-size="40" font-weight="600" fill="#3D1C1E">hiku</text>
      <text x="90" y="14" text-anchor="middle" font-family="'Playfair Display',serif" font-size="10" font-style="italic" fill="#3D1C1E" opacity="0.5">by harper</text>
    </svg>`;

    // ─── Build thumbnails ───
    const thumbEls = [];
    items.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'thumb' + (item.type === 'logo' ? ' thumb--logo' : '');
      if (item.type === 'logo') {
        div.innerHTML = logoSVG;
      } else {
        div.innerHTML = `<img src="${item.img}" alt="${item.name}">`;
      }
      div.addEventListener('click', () => selectItem(i));
      thumbsContainer.appendChild(div);
      thumbEls.push(div);
    });

    // ─── Build stacked frames per item ───
    items.forEach((item, i) => {
      activeSlide[i] = 0;
      const stackDiv = document.createElement('div');
      stackDiv.className = 'product-stack';
      stackDiv.id = `stack-${i}`;

      if (item.type === 'logo') {
        // Brand: 3 slides
        stackDiv.innerHTML = `
          <div class="frame frame--brand" data-depth="0">
            <div class="frame__bg" style="background: ${item.slides[0].bg}"></div>
            <div class="frame__content">
              <div class="frame--brand-logo">hiku<sup>by harper</sup></div>
              <div class="frame--brand-tagline">the coolest thing you can be is yourself</div>
              <div class="frame--brand-cta">Explore the collection</div>
            </div>
          </div>
          <div class="frame frame--brand" data-depth="1">
            <div class="frame__bg" style="background: ${item.slides[1].bg}"></div>
            <div class="frame__content">
              <div class="frame__title">Kind to Skin</div>
              <div class="frame__subtitle">Derm-tested, Gen Z–approved formulas that actually work without being harsh. No sulfates, no parabens — just good ingredients.</div>
            </div>
          </div>
          <div class="frame frame--brand" data-depth="2">
            <div class="frame__bg" style="background: ${item.slides[2].bg}"></div>
            <div class="frame__content">
              <div class="frame__title">9 SKUs, Endless Routines</div>
              <div class="frame__subtitle">Mix, match, layer however you want. Your skin, your call.</div>
            </div>
          </div>`;
      } else {
        // Product: slide 1 = hero image, slide 2 = description + how-to, slide 3 = ingredients
        const lighterBg = item.bg.replace(/100%\)/, '100%)').replace('ellipse', 'ellipse');
        stackDiv.innerHTML = `
          <div class="frame" data-depth="0">
            <div class="frame__bg" style="background: ${item.bg}"></div>
            <div class="frame__content">
              <img src="${item.img}" alt="${item.name}">
            </div>
          </div>
          <div class="frame" data-depth="1">
            <div class="frame__bg" style="background: ${item.bg}; opacity: 0.6;"></div>
            <div class="frame__content">
              <div class="frame__title">${item.name}</div>
              <div class="frame__subtitle">${item.desc}</div>
              <div class="frame__price">${item.price}</div>
            </div>
          </div>
          <div class="frame" data-depth="2">
            <div class="frame__bg" style="background: ${item.bg}; opacity: 0.35;"></div>
            <div class="frame__content">
              <div class="frame__title">Key Ingredients</div>
              <div class="frame__subtitle">${item.ingredients}</div>
            </div>
          </div>`;
      }

      // Dots
      const dotsDiv = document.createElement('div');
      dotsDiv.className = 'slide-dots';
      for (let s = 0; s < 3; s++) {
        const dot = document.createElement('div');
        dot.className = 'slide-dot' + (s === 0 ? ' active' : '');
        dot.addEventListener('click', () => setSlide(i, s));
        dotsDiv.appendChild(dot);
      }
      stackDiv.appendChild(dotsDiv);

      stackContainer.appendChild(stackDiv);
    });

    // ─── Slide stacking logic ───
    function setSlide(itemIndex, slideIndex) {
      activeSlide[itemIndex] = slideIndex;
      const stack = document.getElementById(`stack-${itemIndex}`);
      const frames = stack.querySelectorAll('.frame');
      const dots = stack.querySelectorAll('.slide-dot');

      frames.forEach((frame, fi) => {
        const forwardDist = (fi - slideIndex + 3) % 3;
        if (forwardDist === 0) {
          // Active: on top
          frame.style.transform = 'translateY(0) scale(1)';
          frame.style.zIndex = 3;
        } else if (forwardDist === 1) {
          // Next: behind, offset down
          frame.style.transform = `translateY(${FRAME_OFFSET}px) scale(${1 - FRAME_SCALE_STEP})`;
          frame.style.zIndex = 2;
        } else {
          // Last: furthest back
          frame.style.transform = `translateY(${FRAME_OFFSET * 2}px) scale(${1 - FRAME_SCALE_STEP * 2})`;
          frame.style.zIndex = 1;
        }
      });

      dots.forEach((dot, di) => dot.classList.toggle('active', di === slideIndex));
    }

    // Click frame to advance slide
    stackContainer.addEventListener('click', (e) => {
      const frame = e.target.closest('.frame');
      if (!frame) return;
      const stack = frame.closest('.product-stack');
      const itemIndex = parseInt(stack.id.split('-')[1]);
      const nextSlide = (activeSlide[itemIndex] + 1) % 3;
      setSlide(itemIndex, nextSlide);
    });

    // ─── Thumb positioning ───
    let currentThumbSize = 120;
    let currentGap = 24;

    function getStep() { return currentThumbSize + currentGap; }

    function getOffset(itemIndex, active) {
      let offset = itemIndex - active;
      if (offset > Math.floor(N / 2)) offset -= N;
      if (offset < -Math.floor(N / 2)) offset += N;
      return offset;
    }

    function layoutThumbs(animate) {
      const step = getStep();
      thumbEls.forEach((el, i) => {
        el.style.width = currentThumbSize + 'px';
        el.style.height = currentThumbSize + 'px';
        el.style.marginLeft = (-currentThumbSize / 2) + 'px';
      });

      thumbEls.forEach((el, i) => {
        const offset = getOffset(i, activeIndex);
        const x = offset * step;
        if (!animate) {
          el.style.transition = 'none';
          el.style.transform = `translateX(${x}px)`;
          el.offsetHeight;
          el.style.transition = '';
        } else {
          el.style.transform = `translateX(${x}px)`;
        }
        el.style.opacity = '1';
        el.classList.toggle('active', i === activeIndex);
      });
    }

    let transitioning = false;

    function selectItem(index, force) {
      if ((index === activeIndex && !force) || transitioning) return;

      const prevActive = activeIndex;
      activeIndex = index;

      if (force) {
        layoutThumbs(false);
      } else {
        transitioning = true;
        const step = getStep();
        thumbEls.forEach((el, i) => {
          const oldOff = getOffset(i, prevActive);
          const newOff = getOffset(i, activeIndex);
          const wrapping = Math.abs(newOff - oldOff) > 2;
          if (wrapping) {
            el.style.transform = `translateX(${oldOff * step}px) scale(0.3)`;
            el.style.opacity = '0';
            setTimeout(() => {
              el.style.transition = 'none';
              el.style.transform = `translateX(${newOff * step}px) scale(0.3)`;
              el.offsetHeight;
              el.style.transition = '';
              el.style.transform = `translateX(${newOff * step}px) scale(1)`;
              el.style.opacity = '1';
            }, 280);
          } else {
            el.style.transform = `translateX(${newOff * step}px)`;
            el.style.opacity = '1';
          }
          el.classList.toggle('active', i === activeIndex);
        });
        setTimeout(() => { transitioning = false; }, 560);
      }

      // Show correct stack
      document.querySelectorAll('.product-stack').forEach((s, si) => {
        s.classList.toggle('active', si === index);
      });

      // Reset slide to 0 for new selection
      setSlide(index, 0);
    }

    // ─── Scroll: compact/expand nav ───
    window.addEventListener('scroll', () => {
      const y = window.scrollY;
      const shouldCompact = y > 80;

      if (shouldCompact && !isCompact) {
        isCompact = true;
        nav.classList.add('compact');
        currentThumbSize = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--thumb-size-small'));
        currentGap = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--thumb-gap-small'));
        layoutThumbs(true);
      } else if (!shouldCompact && isCompact) {
        isCompact = false;
        nav.classList.remove('compact');
        currentThumbSize = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--thumb-size'));
        currentGap = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--thumb-gap'));
        layoutThumbs(true);
      }
    }, { passive: true });

    // ─── Init ───
    currentThumbSize = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--thumb-size'));
    currentGap = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--thumb-gap'));
    selectItem(activeIndex, true);

    // Keyboard nav
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') { e.preventDefault(); selectItem((activeIndex + 1) % N); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); selectItem((activeIndex - 1 + N) % N); }
    });
  </script>

</body>
</html>
