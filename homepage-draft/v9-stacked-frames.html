<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiku — V9 Stacked Frames</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --brown: #3D1C1E;
      --almond: #FDF8F5;
      --serif: 'Playfair Display', 'Big Caslon', Georgia, serif;
      --sans: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --thumb-size: 120px;
      --thumb-gap: 24px;
      --thumb-step: calc(var(--thumb-size) + var(--thumb-gap));
    }
    html, body {
      min-height: 100%;
    }
    body {
      font-family: var(--sans);
      background: var(--almond);
      color: var(--brown);
      -webkit-font-smoothing: antialiased;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ─── Thumbnails ─── */
    .thumbnails-wrap {
      flex-shrink: 0;
      overflow: hidden;
      padding: 32px 0 24px;
    }
    .thumbnails {
      position: relative;
      height: var(--thumb-size);
      margin: 0 auto;
    }
    .thumb {
      width: var(--thumb-size);
      height: var(--thumb-size);
      border-radius: 8px;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      top: 0;
      left: 50%;
      margin-left: calc(var(--thumb-size) / -2);
      transition: border-color 0.3s ease,
                  transform 0.3s ease,
                  opacity 0.3s ease;
      border: 1px solid transparent;
      background: transparent;
    }
    .thumb.active {
      border-color: var(--brown);
    }
    .thumb img {
      width: 85%;
      height: 85%;
      object-fit: contain;
      pointer-events: none;
    }

    /* ─── Stack Container ─── */
    .stack-container {
      position: relative;
      margin: 24px 48px 0;
      height: 70vh;
      margin-bottom: 240px;
    }

    /* ─── Product Stack (one per product) ─── */
    .product-stack {
      position: absolute;
      inset: 0;
      display: none;
    }
    .product-stack.active {
      display: block;
    }

    /* ─── Frames / Slides ─── */
    .frame {
      position: absolute;
      inset: 0;
      overflow: hidden;
      border-radius: 12px;
      cursor: pointer;
      will-change: transform;
      transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .frame__bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
    }

    /* Depth states */
    .frame[data-depth="0"] {
      z-index: 10;
      transform: translateY(0) scale(1);
    }
    .frame[data-depth="1"] {
      z-index: 9;
      transform: translateY(90px) scale(0.96);
    }
    .frame[data-depth="2"] {
      z-index: 8;
      transform: translateY(180px) scale(0.92);
    }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      :root {
        --thumb-size: 72px;
        --thumb-gap: 12px;
      }
      .stack-container {
        margin: 16px 16px 24px;
      }
    }
  </style>
</head>
<body>

  <div class="thumbnails-wrap">
    <div class="thumbnails" id="thumbnails"></div>
  </div>

  <div class="stack-container" id="stackContainer"></div>

  <script>
    // Product images from Figma (thumbnails)
    const IMG_JAR = 'assets/b1983030efe5da27c6000b46e47a3bb5cb301ba1.png';
    const IMG_DROPPER = 'assets/2073f3c36a70227dc6ab5531ba597f67945f8777.png';
    const IMG_TUBE = 'assets/b0eb6302ee336ef8745a70594462453669872c14.png';
    const IMG_SLIM = 'assets/bf4ac0864ff9934a18e93943c82515606d8017bd.png';

    // Each product has 3 frame images: hero, pdp, ugc
    const products = [
      { name: 'Matcha Skin Cleanser', img: IMG_TUBE,
        frames: [
          'assets/matcha-hero.png',
          'assets/matcha-pdp.png',
          'assets/matcha-ugc.png',
        ] },
      { name: 'Guava Glow Moisturizer', img: IMG_JAR,
        frames: [
          'assets/matcha-hero.png',
          'assets/matcha-pdp.png',
          'assets/matcha-ugc.png',
        ] },
      { name: 'Soft Matte Moisturizer', img: IMG_JAR,
        frames: [
          'assets/matcha-hero.png',
          'assets/matcha-pdp.png',
          'assets/matcha-ugc.png',
        ] },
      { name: 'Oak Milk Toner', img: IMG_DROPPER,
        frames: [
          'assets/matcha-hero.png',
          'assets/matcha-pdp.png',
          'assets/matcha-ugc.png',
        ] },
      { name: 'Green Juice Serum', img: IMG_DROPPER,
        frames: [
          'assets/matcha-hero.png',
          'assets/matcha-pdp.png',
          'assets/matcha-ugc.png',
        ] },
      { name: 'Smooth Skin Face Scrub', img: IMG_TUBE,
        frames: [
          'assets/matcha-hero.png',
          'assets/matcha-pdp.png',
          'assets/matcha-ugc.png',
        ] },
      { name: 'Glacé Kiss Balm', img: IMG_SLIM,
        frames: [
          'assets/matcha-hero.png',
          'assets/matcha-pdp.png',
          'assets/matcha-ugc.png',
        ] },
    ];

    const N = products.length;
    let activeIndex = 0; // start on Matcha (first product with real frames)
    const stackContainer = document.getElementById('stackContainer');
    const thumbsContainer = document.getElementById('thumbnails');

    // Track active slide per product
    const activeSlide = new Array(N).fill(0);

    // Build thumbnails
    const thumbEls = [];
    products.forEach((p, i) => {
      const div = document.createElement('div');
      div.className = 'thumb';
      div.innerHTML = `<img src="${p.img}" alt="${p.name}">`;
      div.addEventListener('click', () => selectProduct(i));
      thumbsContainer.appendChild(div);
      thumbEls.push(div);
    });

    // Build a 3-frame stack per product
    products.forEach((p, pi) => {
      const stackDiv = document.createElement('div');
      stackDiv.className = 'product-stack';
      stackDiv.dataset.product = pi;

      p.frames.forEach((frameSrc, fi) => {
        const frame = document.createElement('div');
        frame.className = 'frame';
        frame.dataset.slide = fi;
        frame.innerHTML = `<div class="frame__bg" style="background-image: url('${frameSrc}')"></div>`;
        frame.addEventListener('click', () => cycleSlide(pi));
        stackDiv.appendChild(frame);
      });

      stackContainer.appendChild(stackDiv);
    });

    // ─── Slide cycling within a product's stack ───
    function cycleSlide(productIndex) {
      activeSlide[productIndex] = (activeSlide[productIndex] + 1) % 3;
      layoutStack(productIndex);
    }

    function layoutStack(productIndex) {
      const stackEl = stackContainer.querySelector(`.product-stack[data-product="${productIndex}"]`);
      const frames = stackEl.querySelectorAll('.frame');
      const current = activeSlide[productIndex];

      frames.forEach((frame, fi) => {
        // Forward distance from current slide
        const depth = (fi - current + 3) % 3;
        frame.dataset.depth = depth;
      });
    }

    // ─── Thumbnail positioning (same circular logic) ───
    let transitioning = false;
    const STEP = 144;

    function getOffset(productIndex, active) {
      let offset = productIndex - active;
      if (offset > Math.floor(N / 2)) offset -= N;
      if (offset < -Math.floor(N / 2)) offset += N;
      return offset;
    }

    function selectProduct(index, force) {
      if ((index === activeIndex && !force) || transitioning) return;

      const prevActive = activeIndex;
      activeIndex = index;

      if (force) {
        thumbEls.forEach((el, i) => {
          const offset = getOffset(i, activeIndex);
          el.style.transition = 'none';
          el.style.transform = `translateX(${offset * STEP}px)`;
          el.style.opacity = '1';
          el.offsetHeight;
          el.style.transition = '';
          el.classList.toggle('active', i === activeIndex);
        });
      } else {
        transitioning = true;

        thumbEls.forEach((el, i) => {
          const oldOffset = getOffset(i, prevActive);
          const newOffset = getOffset(i, activeIndex);
          const isWrapping = Math.abs(newOffset - oldOffset) > 2;

          if (isWrapping) {
            el.style.transform = `translateX(${oldOffset * STEP}px) scale(0.3)`;
            el.style.opacity = '0';
            setTimeout(() => {
              el.style.transition = 'none';
              el.style.transform = `translateX(${newOffset * STEP}px) scale(0.3)`;
              el.offsetHeight;
              el.style.transition = '';
              el.style.transform = `translateX(${newOffset * STEP}px) scale(1)`;
              el.style.opacity = '1';
            }, 280);
          } else {
            el.style.transform = `translateX(${newOffset * STEP}px)`;
            el.style.opacity = '1';
          }

          el.classList.toggle('active', i === activeIndex);
        });

        setTimeout(() => { transitioning = false; }, 560);
      }

      // Show only the active product's stack
      document.querySelectorAll('.product-stack').forEach((s, si) => {
        s.classList.toggle('active', si === index);
      });

      // Reset slide to 0 and layout
      activeSlide[index] = 0;
      layoutStack(index);
    }

    // Initialize
    selectProduct(activeIndex, true);

    // Keyboard nav
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault();
        selectProduct((activeIndex + 1) % N);
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        selectProduct((activeIndex - 1 + N) % N);
      }
    });

    // Swipe support
    let touchStartX = 0;
    stackContainer.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
    }, { passive: true });
    stackContainer.addEventListener('touchend', (e) => {
      const diff = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(diff) > 50) {
        if (diff < 0) selectProduct((activeIndex + 1) % N);
        else selectProduct((activeIndex - 1 + N) % N);
      }
    }, { passive: true });
  </script>

</body>
</html>
