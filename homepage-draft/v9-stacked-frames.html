<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiku — V9 Stacked Frames</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --brown: #3D1C1E;
      --almond: #FDF8F5;
      --serif: 'Playfair Display', 'Big Caslon', Georgia, serif;
      --sans: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --thumb-size: 120px;
      --thumb-gap: 24px;
      --thumb-step: calc(var(--thumb-size) + var(--thumb-gap));
    }
    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: var(--sans);
      background: var(--almond);
      color: var(--brown);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* ─── Thumbnails ─── */
    .thumbnails-wrap {
      flex-shrink: 0;
      overflow: hidden;
      padding: 32px 0 24px;
    }
    .thumbnails {
      position: relative;
      height: var(--thumb-size);
      margin: 0 auto;
    }
    .thumb {
      width: var(--thumb-size);
      height: var(--thumb-size);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      top: 0;
      left: 50%;
      margin-left: calc(var(--thumb-size) / -2);
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1),
                  border-color 0.3s ease,
                  opacity 0.4s ease;
      border: 1px solid transparent;
      background: transparent;
    }
    .thumb.active {
      border-color: var(--brown);
    }
    .thumb img {
      width: 85%;
      height: 85%;
      object-fit: contain;
      pointer-events: none;
    }

    /* ─── Stack Container ─── */
    .stack-container {
      flex: 1;
      position: relative;
      margin: 24px 48px 48px;
      overflow: visible;
    }

    /* ─── Frames / Slides ─── */
    .frame {
      position: absolute;
      inset: 0;
      overflow: hidden;
      will-change: transform, opacity;
      transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1),
                  opacity 0.5s ease;
    }
    .frame__bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
    }
    .frame__product {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      height: 55%;
      max-height: 400px;
      filter: drop-shadow(0 8px 32px rgba(61,28,30,0.2));
    }
    .frame__product img {
      height: 100%;
      width: auto;
      object-fit: contain;
    }

    /* Stack: only 3 visible */
    .frame[data-depth="0"] {
      z-index: 10;
      transform: translateY(0) scale(1);
    }
    .frame[data-depth="1"] {
      z-index: 9;
      transform: translateY(28px) scale(0.96);
    }
    .frame[data-depth="2"] {
      z-index: 8;
      transform: translateY(56px) scale(0.92);
    }
    .frame.hidden-frame {
      z-index: 1;
      transform: translateY(70px) scale(0.88);
      opacity: 0;
      pointer-events: none;
    }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      :root {
        --thumb-size: 72px;
        --thumb-gap: 12px;
      }
      .stack-container {
        margin: 16px 16px 24px;
      }
      .frame__product {
        height: 45%;
      }
    }
  </style>
</head>
<body>

  <div class="thumbnails-wrap">
    <div class="thumbnails" id="thumbnails"></div>
  </div>

  <div class="stack-container" id="stack"></div>

  <script>
    // Product images from Figma
    const IMG_JAR = 'assets/b1983030efe5da27c6000b46e47a3bb5cb301ba1.png';
    const IMG_DROPPER = 'assets/2073f3c36a70227dc6ab5531ba597f67945f8777.png';
    const IMG_TUBE = 'assets/b0eb6302ee336ef8745a70594462453669872c14.png';
    const IMG_SLIM = 'assets/bf4ac0864ff9934a18e93943c82515606d8017bd.png';

    const products = [
      { name: 'Guava Glow Moisturizer', img: IMG_JAR,
        bg: 'radial-gradient(ellipse at 40% 40%, #e4bfae 0%, #d4a08a 30%, #c08870 60%, #a87060 100%)' },
      { name: 'Soft Matte Moisturizer', img: IMG_JAR,
        bg: 'radial-gradient(ellipse at 55% 35%, #e8ccc0 0%, #d8b0a0 30%, #c49888 60%, #b08070 100%)' },
      { name: 'Oak Milk Toner', img: IMG_DROPPER,
        bg: 'radial-gradient(ellipse at 45% 50%, #dcc4b4 0%, #ccac98 30%, #b89480 60%, #a47c68 100%)' },
      { name: 'Matcha Skin Cleanser', img: IMG_TUBE,
        bg: 'radial-gradient(ellipse at 50% 40%, #d8c4b0 0%, #c8aa94 30%, #b49078 60%, #a07860 100%)' },
      { name: 'Green Juice Serum', img: IMG_DROPPER,
        bg: 'radial-gradient(ellipse at 60% 45%, #e0c8b8 0%, #d0b09c 30%, #bc9880 60%, #a88068 100%)' },
      { name: 'Smooth Skin Face Scrub', img: IMG_TUBE,
        bg: 'radial-gradient(ellipse at 35% 55%, #dcc0b0 0%, #cca898 30%, #b89080 60%, #a47868 100%)' },
      { name: 'Glacé Kiss Balm', img: IMG_SLIM,
        bg: 'radial-gradient(ellipse at 50% 50%, #e4c8bc 0%, #d4b0a0 30%, #c09884 60%, #ac806c 100%)' }
    ];

    const N = products.length;
    let activeIndex = 3;
    const stack = document.getElementById('stack');
    const thumbsContainer = document.getElementById('thumbnails');

    // Build thumbnails — one per product
    const thumbEls = [];
    products.forEach((p, i) => {
      const div = document.createElement('div');
      div.className = 'thumb';
      div.innerHTML = `<img src="${p.img}" alt="${p.name}">`;
      div.addEventListener('click', () => selectProduct(i));
      thumbsContainer.appendChild(div);
      thumbEls.push(div);
    });

    // Build frames
    products.forEach((p, i) => {
      const frame = document.createElement('div');
      frame.className = 'frame';
      frame.dataset.index = i;
      frame.innerHTML = `
        <div class="frame__bg" style="background: ${p.bg}"></div>
        <div class="frame__product"><img src="${p.img}" alt="${p.name}"></div>
      `;
      stack.appendChild(frame);
    });

    // Position thumbs circularly — active always centered, 3 on each side
    function layoutThumbs() {
      thumbEls.forEach((el, i) => {
        // Shortest circular distance from active
        let offset = i - activeIndex;
        if (offset > Math.floor(N / 2)) offset -= N;
        if (offset < -Math.floor(N / 2)) offset += N;

        // Position: offset * step from center (center = 0)
        const step = 144; // thumb-size + gap on desktop
        const x = offset * step;
        el.style.transform = `translateX(${x}px)`;
        el.classList.toggle('active', i === activeIndex);
      });
    }

    function selectProduct(index, force) {
      if (index === activeIndex && !force) return;
      activeIndex = index;
      layoutThumbs();

      // Stack: active on top, then next 2 visible, rest hidden
      const frames = [...stack.querySelectorAll('.frame')];
      frames.forEach(f => {
        const fi = parseInt(f.dataset.index);
        // Circular distance
        let dist = fi - index;
        if (dist > Math.floor(N / 2)) dist -= N;
        if (dist < -Math.floor(N / 2)) dist += N;
        dist = Math.abs(dist);

        if (dist <= 2) {
          f.dataset.depth = dist;
          f.classList.remove('hidden-frame');
        } else {
          f.removeAttribute('data-depth');
          f.classList.add('hidden-frame');
        }
      });
    }

    // Initialize
    selectProduct(activeIndex, true);

    // Keyboard nav
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault();
        selectProduct((activeIndex + 1) % N);
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        selectProduct((activeIndex - 1 + N) % N);
      }
    });

    // Swipe support
    let touchStartX = 0;
    stack.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
    }, { passive: true });
    stack.addEventListener('touchend', (e) => {
      const diff = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(diff) > 50) {
        if (diff < 0) selectProduct((activeIndex + 1) % N);
        else selectProduct((activeIndex - 1 + N) % N);
      }
    }, { passive: true });
  </script>

</body>
</html>
