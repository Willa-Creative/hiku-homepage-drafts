<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiku — V9 Stacked Frames</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --brown: #3D1C1E;
      --almond: #FDF8F5;
      --serif: 'Playfair Display', 'Big Caslon', Georgia, serif;
      --sans: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --thumb-size: 120px;
      --thumb-gap: 24px;
      --nav-h: 160px; /* thumb bar total height */
    }
    html, body { min-height: 100%; }
    body {
      font-family: var(--sans);
      background: var(--almond);
      color: var(--brown);
      -webkit-font-smoothing: antialiased;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ─── Thumbnails ─── */
    .thumbnails-wrap {
      position: sticky; top: 0; z-index: 200;
      background: var(--almond);
      overflow: hidden; padding: 24px 0 16px;
    }
    .thumbnails { position: relative; height: var(--thumb-size); margin: 0 auto; }
    .thumb {
      width: var(--thumb-size); height: var(--thumb-size);
      border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      position: absolute; top: 0; left: 50%;
      margin-left: calc(var(--thumb-size) / -2);
      transition: border-color 0.3s ease, transform 0.3s ease, opacity 0.3s ease;
      border: 1px solid transparent; background: transparent;
    }
    .thumb.active { border-color: var(--brown); }
    .thumb img { width: 85%; height: 85%; object-fit: contain; pointer-events: none; }
    .thumb--logo { border: none !important; }
    .thumb--logo svg { width: 60%; height: 60%; }

    /* ─── Stacks container ─── */
    #stacks {
      position: relative;
      padding: 0 48px;
      transition: padding 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }
    #stacks.expanded {
      padding: 0;
    }

    .product-stack {
      position: absolute;
      left: 0; right: 0; top: 0;
      opacity: 0;
      transform: scale(0.96);
      pointer-events: none;
      transition: opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                  transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .product-stack.active {
      position: relative;
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    /* ─── Peek cards (deck behind first frame) ─── */
    .peek-cards {
      position: fixed;
      bottom: 8px; left: 48px; right: 48px;
      height: 44px;
      z-index: 0;
      pointer-events: none;
      transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                  opacity 0.3s ease;
    }
    .peek-cards.hidden { opacity: 0; }
    .peek-card {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      border-radius: 12px 12px 0 0;
      transition: background 0.4s ease;
    }
    /* Card 2 peeks 20px behind card 1, inset on each side */
    .peek-card--1 {
      height: 44px;
      left: 12px; right: 12px;
    }
    /* Card 3 peeks 20px behind card 2, further inset */
    .peek-card--2 {
      height: 24px;
      left: 28px; right: 28px;
    }
    #stacks.expanded ~ .peek-cards {
      transform: translateY(100%);
    }

    /* ─── Sticky Card Stack (JR Atelier style) ─── */
    .frame {
      position: sticky;
      top: var(--nav-h);
      height: calc(100vh - var(--nav-h) - 48px);
      width: 100%;
      overflow: hidden;
      border-radius: 12px;
      will-change: transform;
      transition: height 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                  border-radius 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }
    #stacks.expanded .frame {
      height: calc(100vh - var(--nav-h));
      border-radius: 0;
    }
    /* Each frame gets a higher z-index so it stacks on top */
    .frame:nth-child(1) { z-index: 1; }
    .frame:nth-child(2) { z-index: 2; }
    .frame:nth-child(3) { z-index: 3; }

    .frame__bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
    }

    .frame--placeholder {
      display: flex; align-items: center; justify-content: center;
    }
    .frame--placeholder span {
      font-family: var(--serif); font-size: 18px;
      opacity: 0.4; text-align: center; line-height: 1.5;
    }

    @media (max-width: 768px) {
      :root { --thumb-size: 72px; --thumb-gap: 12px; --nav-h: 112px; }
      #stacks { padding: 0 16px; }
      .peek-cards { left: 16px; right: 16px; bottom: 4px; }
    }
  </style>
</head>
<body>

  <div class="thumbnails-wrap">
    <div class="thumbnails" id="thumbnails"></div>
  </div>

  <div id="stacks"></div>

  <div class="peek-cards">
    <div class="peek-card peek-card--1"></div>
    <div class="peek-card peek-card--2"></div>
  </div>

  <div style="height: 60px;"></div>

  <script>
    const IMG_JAR = 'assets/b1983030efe5da27c6000b46e47a3bb5cb301ba1.png';
    const IMG_DROPPER = 'assets/2073f3c36a70227dc6ab5531ba597f67945f8777.png';
    const IMG_TUBE = 'assets/b0eb6302ee336ef8745a70594462453669872c14.png';
    const IMG_SLIM = 'assets/bf4ac0864ff9934a18e93943c82515606d8017bd.png';

    const LOGO_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="48" height="62" viewBox="0 0 48 62" fill="none"><path d="M43.3792 52.6969V35.6863C43.3792 19.0511 29.9325 19.8104 16.713 29.4093V0L0 4.17174C5.05805 4.9828 6.64833 8.26583 6.64833 16.1175V52.7012C6.64833 57.8091 2.80764 60.9152 2.03179 61.6961H21.3338C20.5537 60.9109 16.7173 57.8091 16.7173 52.7012V30.1729C27.1591 23.5205 33.4688 27.071 33.4688 38.4128V52.7012C33.4688 57.8091 29.6281 60.9152 28.848 61.6961H48C47.2241 60.9109 43.3835 57.8091 43.3835 52.7012" fill="#3D1C1E"/></svg>`;

    const products = [
      {
        name: 'hiku', type: 'logo',
        frames: [{ type: 'image', src: 'assets/main-hero.png' }]
      },
      {
        name: 'Matcha Skin Cleanser', img: IMG_TUBE,
        frames: [
          { type: 'image', src: 'assets/matcha-hero-new.png' },
          { type: 'image', src: 'assets/matcha-calmplex.png' },
          { type: 'image', src: 'assets/matcha-ugc-new.png' },
        ]
      },
      {
        name: 'Guava Glow Moisturizer', img: IMG_JAR,
        frames: [
          { type: 'placeholder', color: '#e4bfae', label: 'Hero' },
          { type: 'placeholder', color: '#d4a08a', label: 'PDP' },
          { type: 'placeholder', color: '#c08870', label: 'UGC' },
        ]
      },
      {
        name: 'Soft Matte Moisturizer', img: IMG_JAR,
        frames: [
          { type: 'placeholder', color: '#e8ccc0', label: 'Hero' },
          { type: 'placeholder', color: '#d8b0a0', label: 'PDP' },
          { type: 'placeholder', color: '#c49888', label: 'UGC' },
        ]
      },
      {
        name: 'Oak Milk Toner', img: IMG_DROPPER,
        frames: [
          { type: 'placeholder', color: '#dcc4b4', label: 'Hero' },
          { type: 'placeholder', color: '#ccac98', label: 'PDP' },
          { type: 'placeholder', color: '#b89480', label: 'UGC' },
        ]
      },
      {
        name: 'Green Juice Serum', img: IMG_DROPPER,
        frames: [
          { type: 'placeholder', color: '#c8d4b8', label: 'Hero' },
          { type: 'placeholder', color: '#b0c098', label: 'PDP' },
          { type: 'placeholder', color: '#98ac80', label: 'UGC' },
        ]
      },
      {
        name: 'Smooth Skin Face Scrub', img: IMG_TUBE,
        frames: [
          { type: 'placeholder', color: '#dcc0b0', label: 'Hero' },
          { type: 'placeholder', color: '#cca898', label: 'PDP' },
          { type: 'placeholder', color: '#b89080', label: 'UGC' },
        ]
      },
      {
        name: 'Glacé Kiss Balm', img: IMG_SLIM,
        frames: [
          { type: 'placeholder', color: '#e4c8bc', label: 'Hero' },
          { type: 'placeholder', color: '#d4b0a0', label: 'PDP' },
          { type: 'placeholder', color: '#c09884', label: 'UGC' },
        ]
      },
    ];

    const N = products.length;
    let activeIndex = 0;
    const stacksContainer = document.getElementById('stacks');
    const thumbsContainer = document.getElementById('thumbnails');

    // ─── Build thumbnails ───
    const thumbEls = [];
    products.forEach((p, i) => {
      const div = document.createElement('div');
      if (p.type === 'logo') {
        div.className = 'thumb thumb--logo';
        div.innerHTML = LOGO_SVG;
      } else {
        div.className = 'thumb';
        div.innerHTML = `<img src="${p.img}" alt="${p.name}">`;
      }
      div.addEventListener('click', () => selectProduct(i));
      thumbsContainer.appendChild(div);
      thumbEls.push(div);
    });

    // ─── Build sticky card stacks ───
    const stackEls = [];
    products.forEach((p, pi) => {
      const stackDiv = document.createElement('div');
      stackDiv.className = 'product-stack';
      stackDiv.dataset.product = pi;

      p.frames.forEach((f, fi) => {
        const frame = document.createElement('div');

        if (f.type === 'image') {
          frame.className = 'frame';
          frame.innerHTML = `<div class="frame__bg" style="background-image:url('${f.src}')"></div>`;
        } else {
          frame.className = 'frame frame--placeholder';
          frame.style.background = f.color;
          frame.innerHTML = `<span>${p.name}<br>${f.label}</span>`;
        }

        stackDiv.appendChild(frame);
      });

      stacksContainer.appendChild(stackDiv);
      stackEls.push(stackDiv);
    });

    // ─── Thumbnail positioning ───
    let transitioning = false;
    const STEP = 144;

    function getOffset(i, active) {
      let o = i - active;
      if (o > Math.floor(N / 2)) o -= N;
      if (o < -Math.floor(N / 2)) o += N;
      return o;
    }

    function selectProduct(index, force) {
      if ((index === activeIndex && !force) || transitioning) return;
      const prev = activeIndex;
      activeIndex = index;

      if (force) {
        thumbEls.forEach((el, i) => {
          const o = getOffset(i, activeIndex);
          el.style.transition = 'none';
          el.style.transform = `translateX(${o * STEP}px)`;
          el.style.opacity = '1';
          el.offsetHeight;
          el.style.transition = '';
          el.classList.toggle('active', i === activeIndex);
        });
      } else {
        transitioning = true;
        thumbEls.forEach((el, i) => {
          const oldO = getOffset(i, prev);
          const newO = getOffset(i, activeIndex);
          if (Math.abs(newO - oldO) > 2) {
            el.style.transform = `translateX(${oldO * STEP}px) scale(0.3)`;
            el.style.opacity = '0';
            setTimeout(() => {
              el.style.transition = 'none';
              el.style.transform = `translateX(${newO * STEP}px) scale(0.3)`;
              el.offsetHeight;
              el.style.transition = '';
              el.style.transform = `translateX(${newO * STEP}px) scale(1)`;
              el.style.opacity = '1';
            }, 280);
          } else {
            el.style.transform = `translateX(${newO * STEP}px)`;
            el.style.opacity = '1';
          }
          el.classList.toggle('active', i === activeIndex);
        });
        setTimeout(() => { transitioning = false; }, 560);
      }

      // Show active stack
      stackEls.forEach((s, si) => s.classList.toggle('active', si === index));

      // Update peek cards
      updatePeekCards(index);

      // Scroll to top
      if (!force) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    // ─── Peek cards logic ───
    const peekCardsEl = document.querySelector('.peek-cards');
    const peekCard1 = document.querySelector('.peek-card--1');
    const peekCard2 = document.querySelector('.peek-card--2');

    function getFrameColor(frame) {
      if (frame.type === 'placeholder') return frame.color;
      // For image frames, use a muted tone
      return 'rgba(61, 28, 30, 0.08)';
    }

    function updatePeekCards(index) {
      const p = products[index];
      if (p.frames.length <= 1) {
        // Single frame (logo) — hide peek cards
        peekCardsEl.classList.add('hidden');
      } else {
        peekCardsEl.classList.remove('hidden');
        peekCard1.style.background = getFrameColor(p.frames[1]);
        if (p.frames[2]) {
          peekCard2.style.background = getFrameColor(p.frames[2]);
          peekCard2.style.display = '';
        } else {
          peekCard2.style.display = 'none';
        }
      }
    }

    // ─── Scroll-driven expansion ───
    const stacksEl = document.getElementById('stacks');
    const EXPAND_THRESHOLD = 40; // px scrolled before expanding

    window.addEventListener('scroll', () => {
      const scrollY = window.scrollY;
      if (scrollY > EXPAND_THRESHOLD) {
        stacksEl.classList.add('expanded');
      } else {
        stacksEl.classList.remove('expanded');
      }
    }, { passive: true });

    // Init
    selectProduct(activeIndex, true);

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') { e.preventDefault(); selectProduct((activeIndex + 1) % N); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); selectProduct((activeIndex - 1 + N) % N); }
    });
  </script>
</body>
</html>
